<!DOCTYPE html>
<html lang = "vi">
	<head>
		<title>thiết kế from</title>
		<meta charset = "utf-8">
		<link rel="stylesheet" href="../css/stye2.css">
	</head>
	<body>
		<div class="login">
				<h3>đăng ký hệ thống</h3>
			<form>
				<div>
					<label for="txtname">tên đăng nhập: </label><br>
					<input type="text" id="txtname" placeholder="nhập họ tên đi bạn">
				</div>
				<div>
					<label for="txtpass">mật khẩu: </label><br>
					<input type="password" id="txtpass" placeholder="nhập mật khẩu khó khó xíu nha">
				</div>
                <div>
					<label for="txtpass">xác nhận mật khẩu: </label><br>
					<input type="password" id="txtpass" placeholder="mật khẩu phải giống với mật khẩu trên">
				</div>
				<div>
					<input class="button" type="submit" value="đăng ký">
					<input class="button" type="reset" value="nhập lại">
				</div>
			</form>
		</div>
	</body>
</html>
